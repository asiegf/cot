openapi: 3.1.0
info:
  title: Test API
  version: 1.0.0
paths:
  /status:
    get:
      summary: Status
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Status'
  /items:
    get:
      summary: List items
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Item'
  /items/{id}:
    get:
      summary: Get item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
  /empty-items:
    get:
      summary: List empty items
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Item'
  /explicit-empty-items:
    get:
      summary: List explicitly empty items
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                minItems: 0
                items:
                  $ref: '#/components/schemas/Item'
  /required-items:
    get:
      summary: List required items
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                minItems: 1
                items:
                  $ref: '#/components/schemas/Item'
  /featured-items:
    get:
      summary: List featured items
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                maxItems: 1
                items:
                  $ref: '#/components/schemas/Item'
components:
  schemas:
    Status:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
        message:
          type: string
    Item:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
        name:
          type: string
